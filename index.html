<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPX Route Explorer</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');

:root {
  --bg:        #0f1117;
  --surface:   #181c27;
  --panel:     #1e2333;
  --border:    #2d3448;
  --accent:    #e8b84b;
  --accent2:   #4be8a8;
  --text:      #d4d8e8;
  --muted:     #6b7399;
  --sidebar-w: 230px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg);
             color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; }

/* ══════════════════════════════════════
   LAYOUT
══════════════════════════════════════ */
#shell { display: flex; height: 100vh; overflow: hidden; min-height: 0; }

/* ══════════════════════════════════════
   SIDEBAR
══════════════════════════════════════ */
#sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: width 0.25s ease, min-width 0.25s ease, border 0.25s ease;
}

#sidebar.collapsed {
  width: 0;
  min-width: 0;
  border-right: none;
}

/* Keep inner content fixed width so it doesn't squish during transition */
#sidebar > * { min-width: var(--sidebar-w); }

/* Routes button in topbar */
#btn-routes {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--accent);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  padding: 0 12px;
  height: 30px;
  display: flex;
  align-items: center;
  cursor: pointer;
  flex-shrink: 0;
  white-space: nowrap;
  transition: border-color 0.13s, background 0.13s;
  user-select: none;
}
#btn-routes:hover  { border-color: var(--accent); background: var(--surface); }
#btn-routes.open   { border-color: var(--accent); background: var(--surface); }

#sidebar-header {
  padding: 18px 16px 14px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#sidebar-header h2 {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  color: var(--accent);
  line-height: 1.2;
}
#sidebar-header p {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  margin-top: 5px;
  text-transform: uppercase;
  letter-spacing: 0.09em;
}

#routes-label {
  padding: 12px 16px 5px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  flex-shrink: 0;
}

#route-list {
  flex: 1;
  overflow-y: auto;
  padding: 3px 0 10px;
}
#route-list::-webkit-scrollbar { width: 4px; }
#route-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.route-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 16px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: background 0.13s, color 0.13s, border-color 0.13s;
  font-size: 13px;
  color: var(--muted);
  user-select: none;
}
.route-item:hover  { background: var(--panel); color: var(--text); border-left-color: var(--border); }
.route-item.active { background: var(--panel); color: var(--accent); border-left-color: var(--accent); font-weight: 500; }
.route-icon { font-size: 14px; flex-shrink: 0; opacity: 0.7; }
.route-item.active .route-icon { opacity: 1; }

#sidebar-msg {
  padding: 14px 16px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  line-height: 1.8;
}

/* ══════════════════════════════════════
   MAIN
══════════════════════════════════════ */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; position: relative; }

/* Loading bar */
#loading-bar {
  position: absolute; top: 0; left: 0; right: 0;
  height: 2px; background: var(--accent);
  width: 0%; opacity: 0;
  transition: width 0.25s ease, opacity 0.3s;
  z-index: 9999; pointer-events: none;
}

/* ── Top bar ── */
#topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 8px 18px;
  display: flex; align-items: center; gap: 12px;
  flex-shrink: 0; min-height: 42px;
}
#route-title {
  font-family: 'Playfair Display', serif;
  font-size: 15px; color: var(--muted); font-style: italic;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  flex-shrink: 1; min-width: 0;
}
#route-title.loaded { color: var(--text); font-style: normal; }

#stats-bar { display: none; gap: 7px; flex-shrink: 0; flex-wrap: wrap; }
.stat-pill {
  display: flex; align-items: center; gap: 5px;
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 20px; padding: 3px 10px;
  font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted);
  white-space: nowrap;
}
.stat-pill b { color: var(--accent); font-weight: 500; }

/* ── Map ── */
#map-wrap { flex: 0 0 37%; min-height: 160px; max-height: 340px; border-bottom: 1px solid var(--border); }
#map { width: 100%; height: 100%; }

/* ── Elevation ── */
#profile-wrap {
  flex: 0 0 18%; min-height: 80px; max-height: 150px;
  background: var(--surface); border-bottom: 1px solid var(--border);
  position: relative; padding: 6px 14px 4px;
}
#profile-label {
  position: absolute; top: 6px; left: 14px;
  font-family: 'DM Mono', monospace; font-size: 10px;
  color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em;
  pointer-events: none; z-index: 2;
}
#elevation-chart { width: 100%; height: 100%; }

/* ── Image area ── */
#image-area {
  flex: 1; display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden; background: #0a0c10; min-height: 120px;
}
#route-image { max-width: 100%; max-height: 100%; object-fit: contain; display: none; transition: opacity 0.15s; }
#route-image:hover { opacity: 0.88; }

#no-image-msg {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  color: var(--muted); font-family: 'DM Mono', monospace; font-size: 12px;
  text-align: center; pointer-events: none;
}
.ni-icon { font-size: 32px; opacity: 0.3; }

#image-meta {
  position: absolute; bottom: 8px; left: 10px;
  background: rgba(15,17,23,0.88); border: 1px solid var(--border);
  border-radius: 4px; padding: 3px 10px;
  font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted);
  backdrop-filter: blur(4px); display: none; pointer-events: none;
}

/* Empty state */
#empty-state {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 14px; background: var(--bg); z-index: 10; pointer-events: none;
}
#empty-state .es-icon { font-size: 50px; opacity: 0.18; }
#empty-state p {
  font-family: 'DM Mono', monospace; font-size: 12px;
  color: var(--muted); text-align: center; line-height: 1.8;
}
#empty-state.hidden { display: none; }

/* ── Scrubber ── */
#scrubber-wrap {
  flex-shrink: 0; padding: 9px 18px 13px;
  background: var(--surface); border-top: 1px solid var(--border);
}
#scrubber-controls { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; }

.ctrl-btn {
  background: var(--panel); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 11px; flex-shrink: 0; user-select: none;
  transition: border-color 0.13s, color 0.13s;
}
.ctrl-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
.ctrl-btn:disabled { opacity: 0.28; cursor: default; }

#scrubber-pos {
  font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted);
  flex-shrink: 0; min-width: 150px;
}
#scrubber-pos .cur { color: var(--accent2); }

/* Track */
#scrubber-track { position: relative; height: 28px; display: flex; align-items: center; }
#track-bg { width: 100%; height: 4px; background: var(--border); border-radius: 2px; position: relative; }
#track-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; width: 0%; pointer-events: none; }
#track-ticks { position: absolute; inset: 0; pointer-events: none; }
.img-tick {
  position: absolute; top: 50%; transform: translate(-50%,-50%);
  width: 5px; height: 5px; background: var(--accent); border-radius: 50%; opacity: 0.5;
}
#track-thumb {
  position: absolute; top: 50%; left: 0%;
  transform: translate(-50%,-50%);
  width: 14px; height: 14px; background: #fff;
  border: 2px solid var(--accent); border-radius: 50%;
  box-shadow: 0 0 8px rgba(232,184,75,0.5);
  pointer-events: none;
}
#scrubber-input {
  position: absolute; width: 100%; height: 100%;
  opacity: 0; cursor: pointer; margin: 0;
}

/* Leaflet */
.leaflet-tile { filter: brightness(0.82) saturate(0.85); }
.leaflet-container { background: #0f1117; }

/* Marker dots */
.pos-dot   { width:13px;height:13px;background:var(--accent);border:2px solid #fff;border-radius:50%;box-shadow:0 0 9px rgba(232,184,75,.75); }
.start-dot { width:10px;height:10px;background:var(--accent2);border:2px solid #fff;border-radius:50%;opacity:.85; }
.end-dot   { width:10px;height:10px;background:#e84b6a;border:2px solid #fff;border-radius:50%;opacity:.85; }

* { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
/* ── Tablet / small screen (iPad portrait ~768px tall) ── */
@media (max-height: 850px) {
  #map-wrap    { flex: 0 0 280px; max-height: 280px; }
  #profile-wrap { flex: 0 0 120px; max-height: 120px; }
}

@media (max-height: 680px) {
  #map-wrap    { flex: 0 0 220px; max-height: 220px; }
  #profile-wrap { flex: 0 0 100px; max-height: 100px; }
  #topbar      { min-height: 36px; padding: 5px 14px; }
  #scrubber-wrap { padding: 6px 14px 10px; }
  #scrubber-controls { margin-bottom: 6px; }
}

/* On narrow screens hide stats bar */
@media (max-width: 600px) {
  #stats-bar { display: none !important; }
}

</style>
</head>
<body>
<div id="shell">

  <!-- ══ SIDEBAR ══ -->
  <div id="sidebar" class="collapsed">
    <div id="sidebar-header">
      <h2>Route<br>Explorer</h2>
      <p>GPX · Elevation · Images</p>
    </div>
    <div id="routes-label">Routes</div>
    <div id="route-list">
      <div id="sidebar-msg">Scanning Routes/…</div>
    </div>
  </div>

  <!-- ══ MAIN ══ -->
  <div id="main">
    <div id="loading-bar"></div>

    <div id="topbar">
      <button id="btn-routes">🗺 Routes</button>
      <div id="route-title">Select a route</div>
      <div id="stats-bar">
        <div class="stat-pill">↔&nbsp;<b id="s-dist">—</b></div>
        <div class="stat-pill">↑&nbsp;<b id="s-gain">—</b></div>
        <div class="stat-pill">↓&nbsp;<b id="s-loss">—</b></div>
        <div class="stat-pill">📷&nbsp;<b id="s-imgs">—</b>&nbsp;images</div>
      </div>
    </div>

    <div id="map-wrap"><div id="map"></div></div>

    <div id="profile-wrap">
      <div id="profile-label">Elevation Profile</div>
      <canvas id="elevation-chart"></canvas>
    </div>

    <div id="image-area">
      <div id="empty-state">
        <div class="es-icon">🗺️</div>
        <p>Select a route from the panel<br>to load the map &amp; imagery</p>
      </div>
      <a id="streetview-link" target="_blank" rel="noopener noreferrer">
      <img id="route-image" alt="Route view"/>
      </a>
      <div id="no-image-msg" style="display:none">
        <div class="ni-icon">📷</div>
        <div id="no-image-text">No image at this position</div>
      </div>
      <div id="image-meta"></div>
    </div>

    <div id="scrubber-wrap">
      <div id="scrubber-controls">
        <button class="ctrl-btn" id="btn-start" title="Go to start"    disabled>⏮</button>
        <button class="ctrl-btn" id="btn-prev"  title="Previous image" disabled>⏪</button>
        <button class="ctrl-btn" id="btn-play"  title="Play / Pause"   disabled>▶</button>
        <button class="ctrl-btn" id="btn-next"  title="Next image"     disabled>⏩</button>
        <button class="ctrl-btn" id="btn-end"   title="Go to end"      disabled>⏭</button>
        <div id="scrubber-pos">— / —</div>
      </div>
      <div id="scrubber-track">
        <div id="track-bg">
          <div id="track-fill"></div>
          <div id="track-ticks"></div>
          <div id="track-thumb"></div>
        </div>
        <input type="range" id="scrubber-input" min="0" max="10000" value="0" step="1" disabled>
      </div>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   GPX ROUTE EXPLORER
   Expects this file layout (served by a local web server):

     index.html
     Routes/
       routes_index.json        ← ["RouteA","RouteB",...] — see README
       RouteA/
         <anything>.gpx
         image_file_locations.csv   cols: lon,lat,ele,filename
         images/
           img001.jpg …
       RouteB/
         …
═══════════════════════════════════════════════════════════════ */

// ── Config ────────────────────────────────────────────────────
const ROUTES_PATH  = 'Routes';

// URL parameter: ?routes=adv  →  Routes/adv_index.json
// No parameter  →  Routes/demo_index.json
// e.g. index.html?routes=adv   index.html?routes=girona
const _routesParam  = new URLSearchParams(window.location.search).get('routes');
const ROUTES_INDEX  = _routesParam ? `${_routesParam}_index.json` : 'demo_index.json';
const IMG_THRESHOLD = 250;    // metres — how close the scrubber must be to show an image
const SCRUBBER_RES  = 10000;  // range input steps
const PLAY_MS       = 50;     // ms per play tick
const PLAY_DURATION = 120000;  // ms to traverse entire route during playback

// ── State ─────────────────────────────────────────────────────
const S = {
  active:    null,
  gpxPoints: [],   // [{lat,lon,ele,dist}]
  totalDist: 0,
  images:    [],   // [{dist,lat,lon,fname,url}] sorted by dist
  pos:       0,    // 0..1
  playing:   false,
  playTimer: null,
};

// ── Map ───────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: true })
              .setView([20, 0], 2);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a>',
  maxZoom: 19,
}).addTo(map);

let routeLayer  = null;
let posMarker   = null;
let startMarker = null;
let endMarker   = null;
let elevChart   = null;

// ── DOM helpers ───────────────────────────────────────────────
const $  = id => document.getElementById(id);
const scrubInput  = $('scrubber-input');

// ═══════════════════════════════════════════════════════════════
//  INIT — discover Routes/
// ═══════════════════════════════════════════════════════════════
async function init() {
  let names = [];

  // 1. Try Routes/routes_index.json  (user-authored list)
  try {
    const r = await fetch(`${ROUTES_PATH}/${ROUTES_INDEX}`);
    if (r.ok) names = await r.json();
  } catch(_) {}

  // 2. Fall back to parsing a directory listing page
  if (!names.length) {
    try {
      const r = await fetch(`${ROUTES_PATH}/`);
      if (r.ok) names = parseDirListing(await r.text());
    } catch(_) {}
  }

  const msgEl = $('sidebar-msg');
  if (!names.length) {
    msgEl.innerHTML =
      `No routes found.<br><br>
       Create <code>Routes/${ROUTES_INDEX}</code><br>
       listing your route folder names,<br>
       or enable directory listing on<br>
       your local server.<br><br>
       See README for details.`;
    return;
  }

  msgEl.remove();
  renderSidebar(names);
}

function parseDirListing(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const names = [];
  for (const a of doc.querySelectorAll('a[href]')) {
    const raw = a.getAttribute('href');
    // Strip trailing slash then take the last path segment
    let h = decodeURIComponent(raw.replace(/\/$/, '').split('/').pop());
    // Skip: empty, query strings, parent refs, dotfiles, anything with an extension,
    // and the Routes folder itself appearing as an entry
    if (!h) continue;
    if (h.startsWith('?')) continue;
    if (h.startsWith('.')) continue;       // .., .hidden
    if (h.includes('.')) continue;         // files (extensions)
    if (h === ROUTES_PATH) continue;       // skip "Routes" itself
    if (h === ROUTES_PATH.toLowerCase()) continue;
    names.push(h);
  }
  return names;
}

// ═══════════════════════════════════════════════════════════════
//  SIDEBAR
// ═══════════════════════════════════════════════════════════════
function renderSidebar(names) {
  const list = $('route-list');
  list.innerHTML = '';
  for (const name of names) {
    const div = document.createElement('div');
    div.className = 'route-item' + (name === S.active ? ' active' : '');
    div.innerHTML = `<span class="route-icon">🗂</span><span>${escHtml(name)}</span>`;
    div.addEventListener('click', () => loadRoute(name, names));
    list.appendChild(div);
  }
}

// ═══════════════════════════════════════════════════════════════
//  LOAD ROUTE
// ═══════════════════════════════════════════════════════════════
async function loadRoute(name, allNames) {
  if (S.active === name) return;
  S.active = name;
  stopPlay();
  renderSidebar(allNames);
  setLoadingBar(10);

  const base = `${ROUTES_PATH}/${encodeURIComponent(name)}`;

  // ── Find & fetch the GPX ─────────────────────────────
  // 1. Try route_info.json (required on GitHub Pages, no directory listing).
  // 2. Fall back to scanning the directory listing (works on local servers).
  let gpxText = null;
  try {
    const infoR = await fetch(`${base}/route_info.json`);
    if (infoR.ok) {
      const info = await infoR.json();
      if (info.gpx) {
        const r2 = await fetch(`${base}/${encodeURIComponent(info.gpx)}`);
        if (r2.ok) gpxText = await r2.text();
      }
    }
  } catch(_) {}

  // Directory listing fallback (local server)
  if (!gpxText) {
    try {
      const dirR = await fetch(`${base}/`);
      if (dirR.ok) {
        const dirHtml = await dirR.text();
        const doc = new DOMParser().parseFromString(dirHtml, 'text/html');
        for (const a of doc.querySelectorAll('a[href]')) {
          const href = decodeURIComponent(a.getAttribute('href') || '');
          const fname = href.replace(/\/$/, '').split('/').pop();
          if (fname.toLowerCase().endsWith('.gpx')) {
            const r2 = await fetch(`${base}/${encodeURIComponent(fname)}`);
            if (r2.ok) { gpxText = await r2.text(); break; }
          }
        }
      }
    } catch(_) {}
  }

  setLoadingBar(30);

  if (!gpxText) {
    alert(`Could not find a .gpx file in Routes/${name}/`);
    setLoadingBar(0); return;
  }

  // ── Parse GPX ────────────────────────────────────────
  const pts = parseGpx(gpxText);
  if (pts.length < 2) { alert('GPX has fewer than 2 track points.'); setLoadingBar(0); return; }

  pts[0].dist = 0;
  let total = 0;
  for (let i = 1; i < pts.length; i++) {
    total += haversine(pts[i-1], pts[i]);
    pts[i].dist = total;
  }
  S.gpxPoints = pts;
  S.totalDist = total;

  setLoadingBar(55);

  // ── Parse CSV ────────────────────────────────────────
  const images = [];
  try {
    const r = await fetch(`${base}/image_file_locations.csv`);
    if (r.ok) {
      const parsed = Papa.parse((await r.text()).trim(), {
        header: false, skipEmptyLines: true, dynamicTyping: false,
      });
      for (const row of parsed.data) {
        if (row.length < 4) continue;
        const lon   = parseFloat(row[0]);
        const lat   = parseFloat(row[1]);
        const ele   = parseFloat(row[2]);
        const fname = String(row[3]).trim();
        if (isNaN(lat) || isNaN(lon) || !fname) continue;
        const dist = nearestDist(pts, lat, lon);
        const url  = `${base}/images/${encodeURIComponent(fname)}`;
        images.push({ dist, lat, lon, ele, fname, url });
      }
      images.sort((a, b) => a.dist - b.dist);
    }
  } catch(_) {}

  S.images = images;
  setLoadingBar(75);

  // ── Elevation stats ───────────────────────────────────
  let gain = 0, loss = 0;
  for (let i = 1; i < pts.length; i++) {
    const d = pts[i].ele - pts[i-1].ele;
    if (d > 0) gain += d; else loss -= d;
  }

  // ── Update UI chrome ──────────────────────────────────
  const titleEl = $('route-title');
  titleEl.textContent = name;
  titleEl.classList.add('loaded');
  $('stats-bar').style.display = 'flex';
  $('s-dist').textContent = fmtDist(total);
  $('s-gain').textContent = Math.round(gain) + ' m';
  $('s-loss').textContent = Math.round(loss) + ' m';
  $('s-imgs').textContent = images.length;

  // ── Map ───────────────────────────────────────────────
  drawMap(pts);

  // ── Elevation chart ───────────────────────────────────
  drawElevation(pts);

  // ── Scrubber ticks ────────────────────────────────────
  renderTicks(images, total);

  // ── Enable controls ───────────────────────────────────
  for (const id of ['btn-start','btn-prev','btn-play','btn-next','btn-end']) $(id).disabled = false;
  scrubInput.disabled = false;
  scrubInput.value = 0;

  // ── Hide empty state ──────────────────────────────────
  $('empty-state').classList.add('hidden');

  setLoadingBar(100);
  setTimeout(() => setLoadingBar(0), 400);

  // ── Collapse sidebar to give full screen to the route ─────
  setSidebarCollapsed(true);

  // ── Snap to start ─────────────────────────────────────
  setPosition(0);
}

// ═══════════════════════════════════════════════════════════════
//  GPX PARSER
// ═══════════════════════════════════════════════════════════════
function parseGpx(xml) {
  const doc = new DOMParser().parseFromString(xml, 'application/xml');
  const pts = [];
  for (const el of doc.querySelectorAll('trkpt, rtept, wpt')) {
    const lat = parseFloat(el.getAttribute('lat'));
    const lon = parseFloat(el.getAttribute('lon'));
    const eleEl = el.querySelector('ele');
    const ele = eleEl ? parseFloat(eleEl.textContent) : 0;
    if (!isNaN(lat) && !isNaN(lon)) pts.push({ lat, lon, ele: isNaN(ele) ? 0 : ele });
  }
  return pts;
}

// ═══════════════════════════════════════════════════════════════
//  GEOMETRY
// ═══════════════════════════════════════════════════════════════
function haversine(a, b) {
  const R = 6371000, r = x => x * Math.PI / 180;
  const dLat = r(b.lat - a.lat), dLon = r(b.lon - a.lon);
  const s = Math.sin(dLat/2)**2 + Math.cos(r(a.lat)) * Math.cos(r(b.lat)) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(s), Math.sqrt(1-s));
}

function nearestDist(pts, lat, lon) {
  let best = Infinity, bestD = 0;
  for (const p of pts) {
    const d = (p.lat-lat)**2 + (p.lon-lon)**2;
    if (d < best) { best = d; bestD = p.dist; }
  }
  return bestD;
}

/** Compute compass bearing (0-360°) from the GPX track at a given distance (metres). */
function headingAtDist(dist_m) {
  const pts = S.gpxPoints;
  if (pts.length < 2) return 0;
  // Find the segment that contains dist_m
  let i = 1;
  for (; i < pts.length - 1; i++) {
    if (pts[i].dist >= dist_m) break;
  }
  const a = pts[i - 1], b = pts[i];
  return bearingDeg(a.lat, a.lon, b.lat, b.lon);
}

/** Compute compass bearing in degrees from point A to point B. */
function bearingDeg(lat1, lon1, lat2, lon2) {
  const r = Math.PI / 180;
  const dLon = (lon2 - lon1) * r;
  const x = Math.sin(dLon) * Math.cos(lat2 * r);
  const y = Math.cos(lat1 * r) * Math.sin(lat2 * r)
          - Math.sin(lat1 * r) * Math.cos(lat2 * r) * Math.cos(dLon);
  return (Math.atan2(x, y) * 180 / Math.PI + 360) % 360;
}

function interpolate(pos01) {
  const d = pos01 * S.totalDist;
  const pts = S.gpxPoints;
  for (let i = 1; i < pts.length; i++) {
    if (pts[i].dist >= d) {
      const a = pts[i-1], b = pts[i];
      const t = (d - a.dist) / ((b.dist - a.dist) || 1);
      return { lat: a.lat + t*(b.lat-a.lat), lon: a.lon + t*(b.lon-a.lon),
               ele: a.ele + t*(b.ele-a.ele), dist: d };
    }
  }
  return { ...pts[pts.length-1] };
}

// ═══════════════════════════════════════════════════════════════
//  MAP
// ═══════════════════════════════════════════════════════════════
function drawMap(pts) {
  if (routeLayer)  { map.removeLayer(routeLayer);  routeLayer  = null; }
  if (posMarker)   { map.removeLayer(posMarker);   posMarker   = null; }
  if (startMarker) { map.removeLayer(startMarker); startMarker = null; }
  if (endMarker)   { map.removeLayer(endMarker);   endMarker   = null; }

  const lls = pts.map(p => [p.lat, p.lon]);
  routeLayer = L.polyline(lls, { color: '#e8b84b', weight: 3, opacity: 0.85 }).addTo(map);
  map.fitBounds(routeLayer.getBounds(), { padding: [28, 28] });

  const mkIcon = cls => L.divIcon({ className: '', html: `<div class="${cls}"></div>`,
                                    iconSize: [11,11], iconAnchor: [5.5,5.5] });
  startMarker = L.marker(lls[0],            { icon: mkIcon('start-dot'), zIndexOffset: 900 }).addTo(map);
  endMarker   = L.marker(lls[lls.length-1], { icon: mkIcon('end-dot'),   zIndexOffset: 900 }).addTo(map);

  posMarker = L.marker(lls[0], {
    icon: L.divIcon({ className:'', html:'<div class="pos-dot"></div>', iconSize:[13,13], iconAnchor:[6.5,6.5] }),
    zIndexOffset: 1000,
  }).addTo(map);
}

function moveMapMarker(pos01) {
  if (!posMarker) return;
  const p = interpolate(pos01);
  posMarker.setLatLng([p.lat, p.lon]);
}

// ═══════════════════════════════════════════════════════════════
//  ELEVATION CHART
// ═══════════════════════════════════════════════════════════════
function drawElevation(pts) {
  const ctx = $('elevation-chart').getContext('2d');
  if (elevChart) { elevChart.destroy(); elevChart = null; }

  // Use cumulative km as x values
  const xVals = pts.map(p => +(p.dist / 1000).toFixed(4));
  const yVals = pts.map(p => p.ele);

  // Chart.js plugin: draw a vertical cursor + dot
  const cursorPlugin = {
    id: 'cursor',
    afterDraw(chart) {
      if (chart._cx == null) return;
      const { ctx: c, chartArea: ca, scales: { y } } = chart;
      c.save();
      c.beginPath(); c.setLineDash([4,3]);
      c.strokeStyle = 'rgba(75,232,168,0.85)'; c.lineWidth = 1.5;
      c.moveTo(chart._cx, ca.top); c.lineTo(chart._cx, ca.bottom); c.stroke();
      c.setLineDash([]);
      if (chart._cy != null) {
        c.beginPath(); c.arc(chart._cx, chart._cy, 4, 0, Math.PI*2);
        c.fillStyle = '#4be8a8'; c.strokeStyle = '#fff'; c.lineWidth = 1.5;
        c.fill(); c.stroke();
      }
      c.restore();
    }
  };

  elevChart = new Chart(ctx, {
    type: 'line',
    data: {
      datasets: [{
        data: pts.map(p => ({ x: +(p.dist/1000).toFixed(4), y: p.ele })),
        borderColor: '#e8b84b', borderWidth: 1.5,
        fill: true,
        backgroundColor: ctx2 => {
          const g = ctx2.chart.ctx.createLinearGradient(0,0,0,200);
          g.addColorStop(0,'rgba(232,184,75,0.28)'); g.addColorStop(1,'rgba(232,184,75,0.02)');
          return g;
        },
        pointRadius: 0, tension: 0.3,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, animation: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            title: items => `${(+items[0].parsed.x).toFixed(2)} km`,
            label: ctx2 => ` ${ctx2.parsed.y.toFixed(0)} m`,
          },
          backgroundColor:'rgba(15,17,23,0.92)', borderColor:'#2d3448', borderWidth:1,
          titleColor:'#6b7399', bodyColor:'#e8b84b', padding:8,
        },
      },
      scales: {
        x: {
          type: 'linear',
          ticks: { color:'#6b7399', font:{family:'DM Mono',size:9}, maxTicksLimit:8,
                   callback: v => v + ' km' },
          grid: { color:'rgba(45,52,72,0.45)' },
        },
        y: {
          ticks: { color:'#6b7399', font:{family:'DM Mono',size:9}, maxTicksLimit:4,
                   callback: v => v + ' m' },
          grid: { color:'rgba(45,52,72,0.45)' },
        },
      },
    },
    plugins: [cursorPlugin],
  });
}

function moveElevCursor(pos01) {
  if (!elevChart) return;
  const p  = interpolate(pos01);
  const xS = elevChart.scales.x, yS = elevChart.scales.y;
  elevChart._cx = xS.getPixelForValue(p.dist / 1000);
  elevChart._cy = yS.getPixelForValue(p.ele);
  elevChart.draw();
}

// ═══════════════════════════════════════════════════════════════
//  SCRUBBER TICKS
// ═══════════════════════════════════════════════════════════════
function renderTicks(images, total) {
  const c = $('track-ticks');
  c.innerHTML = '';
  for (const img of images) {
    const tick = document.createElement('div');
    tick.className = 'img-tick';
    tick.style.left = (total > 0 ? (img.dist / total) * 100 : 0) + '%';
    c.appendChild(tick);
  }
}

// ═══════════════════════════════════════════════════════════════
//  IMAGE DISPLAY
// ═══════════════════════════════════════════════════════════════
function showImage(pos01) {
  const imgEl   = $('route-image');
  const noImg   = $('no-image-msg');
  const noTxt   = $('no-image-text');
  const meta    = $('image-meta');

  if (S.images.length === 0) {
    imgEl.style.display = 'none';
    linkEl.style.display = 'none';
    noImg.style.display = 'flex';
    noTxt.textContent = 'No images for this route';
    meta.style.display = 'none';
    return;
  }

  const dist = pos01 * S.totalDist;
  let nearest = null, bestD = Infinity;
  for (const img of S.images) {
    const d = Math.abs(img.dist - dist);
    if (d < bestD) { bestD = d; nearest = img; }
  }

  if (nearest && bestD <= IMG_THRESHOLD) {
    const linkEl = document.getElementById('streetview-link');

    imgEl.src = nearest.url;
    imgEl.style.display = 'block';
    imgEl.style.cursor = 'pointer';
    imgEl.title = 'Click to open in Google Street View';

    // Compute heading...
    const svHeading = headingAtDist(nearest.dist);
    const svUrl = `https://www.google.com/maps/@?api=1&map_action=pano`
      + `&viewpoint=${nearest.lat},${nearest.lon}&heading=${svHeading}`;

    // Set link instead of using window.open
    linkEl.href = svUrl;
    linkEl.style.display = 'inline';
    noImg.style.display = 'none';
    meta.innerHTML = `${nearest.fname}  ·  ${fmtDist(nearest.dist)}`
      + `  <span style="color:var(--accent);margin-left:6px" title="Open in Street View">↗ Street View</span>`;
    meta.style.display = 'block';
  } else {
    imgEl.style.display = 'none';
    linkEl.style.display = 'none';
    noImg.style.display = 'flex';
    noTxt.textContent = 'No image near this position';
    meta.style.display = 'none';
  }
}

// ═══════════════════════════════════════════════════════════════
//  SET POSITION  — single entry point that syncs everything
// ═══════════════════════════════════════════════════════════════
function setPosition(pos01) {
  pos01 = Math.max(0, Math.min(1, pos01));
  S.pos = pos01;

  const pct = pos01 * 100;
  $('track-fill').style.width = pct + '%';
  $('track-thumb').style.left = pct + '%';
  scrubInput.value = Math.round(pos01 * SCRUBBER_RES);

  const d = pos01 * S.totalDist;
  $('scrubber-pos').innerHTML =
    `<span class="cur">${fmtDist(d)}</span> / ${fmtDist(S.totalDist)}`;

  moveMapMarker(pos01);
  moveElevCursor(pos01);
  showImage(pos01);
}

// ═══════════════════════════════════════════════════════════════
//  CONTROLS
// ═══════════════════════════════════════════════════════════════
scrubInput.addEventListener('input', () => setPosition(scrubInput.value / SCRUBBER_RES));

$('btn-start').addEventListener('click', () => setPosition(0));
$('btn-end').addEventListener('click',   () => setPosition(1));

$('btn-prev').addEventListener('click', () => {
  const d = S.pos * S.totalDist;
  const prev = S.images.filter(i => i.dist < d - 1);
  setPosition(prev.length ? prev[prev.length-1].dist / S.totalDist : 0);
});
$('btn-next').addEventListener('click', () => {
  const d = S.pos * S.totalDist;
  const next = S.images.filter(i => i.dist > d + 1);
  setPosition(next.length ? next[0].dist / S.totalDist : 1);
});

$('btn-play').addEventListener('click', togglePlay);

function togglePlay() { S.playing ? stopPlay() : startPlay(); }

function startPlay() {
  if (!S.gpxPoints.length) return;
  if (S.pos >= 1) setPosition(0);
  S.playing = true;
  $('btn-play').textContent = '⏸';
  const stepPer50ms = PLAY_MS / PLAY_DURATION;
  S.playTimer = setInterval(() => {
    if (S.pos >= 1) { stopPlay(); return; }
    setPosition(S.pos + stepPer50ms);
  }, PLAY_MS);
}

function stopPlay() {
  S.playing = false;
  clearInterval(S.playTimer);
  $('btn-play').textContent = '▶';
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space')      { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowRight') { e.preventDefault(); setPosition(S.pos + 0.002); }
  if (e.code === 'ArrowLeft')  { e.preventDefault(); setPosition(S.pos - 0.002); }
  if (e.code === 'Home')  setPosition(0);
  if (e.code === 'End')   setPosition(1);
});

// ── Helpers ───────────────────────────────────────────────────
function setLoadingBar(pct) {
  const bar = $('loading-bar');
  bar.style.width   = pct + '%';
  bar.style.opacity = pct === 0 ? '0' : '1';
}
function fmtDist(m) { return m >= 1000 ? (m/1000).toFixed(2)+' km' : Math.round(m)+' m'; }
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Sidebar collapse ──────────────────────────────────────────
function setSidebarCollapsed(collapsed) {
  $('sidebar').classList.toggle('collapsed', collapsed);
  $('btn-routes').classList.toggle('open', !collapsed);
  setTimeout(() => { if (map) map.invalidateSize(); }, 260);
}
$('btn-routes').addEventListener('click', () => {
  setSidebarCollapsed(!$('sidebar').classList.contains('collapsed'));
});

// ── Boot ──────────────────────────────────────────────────────
init();
</script>
</body>
</html>
